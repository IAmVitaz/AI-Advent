<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude — Temperature Comparison</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      background: #1a1a1a;
      color: #fff;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .prompt-bar {
      background: #fff;
      border-bottom: 2px solid #ccc;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-shrink: 0;
    }

    .prompt-bar textarea {
      flex: 1;
      padding: 9px 13px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      background: #fafafa;
      min-height: 56px;
      max-height: 120px;
    }

    .prompt-bar textarea:focus { border-color: #1a1a1a; background: #fff; }

    .prompt-bar button {
      padding: 9px 20px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
      align-self: flex-end;
    }

    .prompt-bar button:hover:not(:disabled) { opacity: 0.75; }
    .prompt-bar button:disabled { opacity: 0.35; cursor: not-allowed; }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      flex: 1;
      gap: 1px;
      background: #ccc;
      overflow: hidden;
    }

    .column {
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .column-header {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 2px solid #ccc;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }

    .column-header.cold   { background: #dbeafe; }
    .column-header.medium { background: #ede9fe; }
    .column-header.hot    { background: #ffedd5; }

    .col-title { font-size: 13px; display: flex; align-items: center; gap: 6px; }

    .col-meta {
      font-size: 11px;
      color: #666;
      font-weight: 400;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.4px;
    }

    .badge.cold   { background: #bfdbfe; color: #1e40af; }
    .badge.medium { background: #ddd6fe; color: #5b21b6; }
    .badge.hot    { background: #fed7aa; color: #9a3412; }

    .boxes {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: #ccc;
    }

    .box {
      background: #fff;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .box-label {
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      color: #aaa;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    .output {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.6;
      color: #111;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output.streaming::after {
      content: "▋";
      animation: blink 0.7s step-end infinite;
    }

    .placeholder {
      color: #ccc;
      font-style: italic;
    }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="top-bar">Claude — Temperature Comparison (5 runs per temperature)</div>

  <div class="prompt-bar">
    <textarea id="promptInput" rows="2" oninput="autoResize(this)">{{ default_prompt }}</textarea>
    <button id="runBtn" onclick="runAll()">Run all 15</button>
  </div>

  <div class="columns">
    <!-- temperature = 0 -->
    <div class="column">
      <div class="column-header cold">
        <div class="col-title">
          <span class="badge cold">temperature = 0</span>
          Deterministic
        </div>
        <div class="col-meta">Accuracy · Reproducibility · Facts</div>
      </div>
      <div class="boxes" id="boxes-0"></div>
    </div>

    <!-- temperature = 0.5 -->
    <div class="column">
      <div class="column-header medium">
        <div class="col-title">
          <span class="badge medium">temperature = 0.5</span>
          Balanced
        </div>
        <div class="col-meta">Balance · Natural flow · Moderate variety</div>
      </div>
      <div class="boxes" id="boxes-05"></div>
    </div>

    <!-- temperature = 1.0 -->
    <div class="column">
      <div class="column-header hot">
        <div class="col-title">
          <span class="badge hot">temperature = 1.0</span>
          Creative
        </div>
        <div class="col-meta">Creativity · Diversity · Surprise</div>
      </div>
      <div class="boxes" id="boxes-10"></div>
    </div>
  </div>

  <script>
    const RUNS = 5;
    const configs = [
      { key: "0",  endpoint: "/generate/temp_0",   label: "temp = 0" },
      { key: "05", endpoint: "/generate/temp_0_5", label: "temp = 0.5" },
      { key: "10", endpoint: "/generate/temp_1_0", label: "temp = 1.0" },
    ];
    let running = 0;

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function buildBoxes() {
      for (const cfg of configs) {
        const container = document.getElementById("boxes-" + cfg.key);
        container.innerHTML = "";
        for (let i = 1; i <= RUNS; i++) {
          const box = document.createElement("div");
          box.className = "box";
          box.innerHTML = `
            <div class="box-label">Run #${i}</div>
            <div class="output" id="out-${cfg.key}-${i}"><span class="placeholder">Waiting…</span></div>
          `;
          container.appendChild(box);
        }
      }
    }

    function setOutput(key, run, text) {
      document.getElementById(`out-${key}-${run}`).textContent = text;
    }

    function appendOutput(key, run, text) {
      const el = document.getElementById(`out-${key}-${run}`);
      el.textContent += text;
      el.scrollTop = el.scrollHeight;
    }

    async function streamBox(cfg, run, prompt) {
      const el = document.getElementById(`out-${cfg.key}-${run}`);
      el.textContent = "";
      el.classList.add("streaming");

      try {
        const res = await fetch(cfg.endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          for (const line of decoder.decode(value).split("\n")) {
            if (!line.startsWith("data: ")) continue;
            const raw = line.slice(6);
            if (raw === "[DONE]") break;
            try { appendOutput(cfg.key, run, JSON.parse(raw).text); } catch {}
          }
        }
      } catch {
        setOutput(cfg.key, run, "Error connecting to Claude.");
      } finally {
        el.classList.remove("streaming");
        running--;
        if (running === 0) {
          document.getElementById("runBtn").disabled = false;
          document.getElementById("promptInput").disabled = false;
        }
      }
    }

    function runAll() {
      const prompt = document.getElementById("promptInput").value.trim();
      if (!prompt) return;

      buildBoxes();

      document.getElementById("runBtn").disabled = true;
      document.getElementById("promptInput").disabled = true;
      running = configs.length * RUNS;

      for (const cfg of configs) {
        for (let i = 1; i <= RUNS; i++) {
          streamBox(cfg, i, prompt);
        }
      }
    }

    // build empty boxes on load
    buildBoxes();
    autoResize(document.getElementById("promptInput"));
  </script>
</body>
</html>
