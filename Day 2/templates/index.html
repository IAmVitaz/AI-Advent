<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message.assistant.streaming::after {
      content: "▋";
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .chat-input-area {
      padding: 16px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #1a1a1a;
    }

    button {
      padding: 10px 20px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      opacity: 0.8;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
      gap: 8px;
    }

    .empty-state svg {
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Claude Chat</div>

    <div class="chat-messages" id="messages">
      <div class="empty-state" id="emptyState">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Start a conversation with Claude</p>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea
        id="userInput"
        placeholder="Type a message..."
        rows="1"
        onInput="autoResize(this)"
        onKeydown="handleKeydown(event)"
      ></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const conversationHistory = [];
    let isStreaming = false;

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function handleKeydown(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function appendMessage(role, text = "") {
      const emptyState = document.getElementById("emptyState");
      if (emptyState) emptyState.remove();

      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function sendMessage() {
      if (isStreaming) return;

      const input = document.getElementById("userInput");
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      input.style.height = "auto";
      document.getElementById("sendBtn").disabled = true;
      isStreaming = true;

      appendMessage("user", text);
      conversationHistory.push({ role: "user", content: text });

      const assistantDiv = appendMessage("assistant");
      assistantDiv.classList.add("streaming");
      let responseText = "";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split("\n");

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = line.slice(6);
            if (data === "[DONE]") break;

            try {
              const parsed = JSON.parse(data);
              responseText += parsed.text;
              assistantDiv.textContent = responseText;
              document.getElementById("messages").scrollTop =
                document.getElementById("messages").scrollHeight;
            } catch {}
          }
        }

        conversationHistory.push({ role: "assistant", content: responseText });
      } catch (err) {
        assistantDiv.textContent = "Error: Could not reach Claude. Make sure ANTHROPIC_API_KEY is set.";
      } finally {
        assistantDiv.classList.remove("streaming");
        isStreaming = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("userInput").focus();
      }
    }
  </script>
</body>
</html>
