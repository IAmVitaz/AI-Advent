<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude — First Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .top-bar {
      background: #1a1a1a;
      color: #fff;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      letter-spacing: 0.4px;
      background: #e0f2fe;
      color: #0369a1;
    }

    #new-chat-btn {
      padding: 6px 14px;
      background: #fff;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #new-chat-btn:hover { opacity: 0.75; }

    /* ── Chat panel ── */
    .chat-panel {
      flex: 1;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .panel-header {
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid #e8e8e8;
      background: #f0f7ff;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .panel-header .panel-meta {
      font-size: 11px;
      color: #888;
      font-weight: 400;
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .panel-header .panel-meta span {
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 4px;
      padding: 1px 6px;
    }

    /* ── Messages ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a1a;
      color: #fff;
      max-width: 75%;
      border-bottom-right-radius: 3px;
      margin-top: 8px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f3f4f6;
      color: #111;
      max-width: 85%;
      border-bottom-left-radius: 3px;
    }

    .message.assistant.streaming::after {
      content: "▋";
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Metrics row ── */
    .metrics {
      align-self: flex-start;
      display: flex;
      gap: 12px;
      padding: 3px 2px 6px;
    }

    .metric {
      font-size: 11px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .metric span {
      display: inline-block;
      background: #eee;
      border-radius: 4px;
      padding: 1px 6px;
      color: #555;
      font-variant-numeric: tabular-nums;
    }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #aaa;
      pointer-events: none;
      font-size: 13px;
    }

    #empty-state .icon { font-size: 36px; }

    /* ── Input bar ── */
    .input-area {
      padding: 12px 16px;
      border-top: 2px solid #ccc;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #f5f5f5;
    }

    textarea {
      flex: 1;
      padding: 9px 13px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.5;
      background: #fff;
    }

    textarea:focus { border-color: #1a1a1a; }

    #send-btn {
      padding: 9px 20px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
      align-self: flex-end;
    }

    #send-btn:hover:not(:disabled) { opacity: 0.75; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="top-bar">
  Claude — First Agent
  <div class="top-bar-right">
    <button id="new-chat-btn">+ New conversation</button>
  </div>
</div>

<div class="chat-panel">
  <div class="panel-header">
    Stateful multi-turn agent
    <div class="panel-meta">
      <span>claude-haiku-4-5</span>
      <span>encapsulated</span>
      <span>streaming</span>
    </div>
  </div>

  <div id="chat">
    <div id="empty-state">
      <div class="icon">🤖</div>
      <p>Start a conversation with the agent</p>
    </div>
  </div>

  <div class="input-area">
    <textarea id="user-input" placeholder="Message the agent…" rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');

  let streaming = false;

  document.getElementById('new-chat-btn').addEventListener('click', newConversation);
  sendBtn.addEventListener('click', send);

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addMessage(role, text = '') {
    emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    chatEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addMetrics(stats) {
    const memKB = (stats.memory_bytes / 1024).toFixed(1);
    const row = document.createElement('div');
    row.classList.add('metrics');
    row.innerHTML = `
      <div class="metric">in <span>${stats.input_tokens} tok</span></div>
      <div class="metric">out <span>${stats.output_tokens} tok</span></div>
      <div class="metric">time <span>${stats.time}s</span></div>
      <div class="metric">memory <span>${memKB} KB</span></div>
    `;
    chatEl.appendChild(row);
    scrollToBottom();
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    streaming = true;
    sendBtn.disabled = true;
    inputEl.disabled = true;

    addMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    const msgEl = addMessage('assistant');
    msgEl.classList.add('streaming');

    let accumulated = '';

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const event = JSON.parse(line.slice(6));
            if (event.type === 'text') {
              accumulated += event.text;
              msgEl.textContent = accumulated;
              msgEl.classList.add('streaming');
              scrollToBottom();
            } else if (event.type === 'done') {
              msgEl.classList.remove('streaming');
              addMetrics(event);
            }
          } catch (_) {}
        }
      }
    } catch (err) {
      msgEl.classList.remove('streaming');
      msgEl.textContent = '⚠ Connection error.';
    }

    streaming = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  }

  async function newConversation() {
    await fetch('/reset', { method: 'POST' });
    chatEl.innerHTML = '';
    chatEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
    inputEl.focus();
  }
</script>

</body>
</html>
